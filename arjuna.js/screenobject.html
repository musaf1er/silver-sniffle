<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Belajar Screen Object</h1>

    <script>
        console.log(`Lebar layar : ${screen.width} px`);
        console.log(`Tinggi layar : ${screen.height} px`);

        console.log(`Resolusi X : ${screen.availWidth} px`);
        console.log(`Resolusi Y : ${screen.availHeight} px`);

        console.log(`Tipe Orientasi layar : ${screen.orientation.type}`);
        console.log(`Sudut Orientasi layar : ${screen.orientation.angle} derajat`);
    </script>
</body>
</html>
