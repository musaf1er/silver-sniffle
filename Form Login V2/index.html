<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Biodata</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            margin: 50px;
        }
        td {
            padding: 8px;
        }
        input {
            width: 250px;
            padding: 6px;
        }
        button {
            padding: 6px 15px;
        }
    </style>
</head>
<body>

<form>
    <table>
        <tr>
            <td>Nama</td>
            <td>:</td>
            <td><input type="text" placeholder="Nama Lengkap"></td>
        </tr>
        <tr>
            <td>Email</td>
            <td>:</td>
            <td><input type="email" placeholder="Email"></td>
        </tr>
        <tr>
            <td>Password</td>
            <td>:</td>
            <td><input type="password" placeholder="Password"></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td><button type="submit">Submit</button></td>
        </tr>
    </table>
</form>

</body>
</html>
